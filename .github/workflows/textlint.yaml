name: Textlint

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Run textlint
        run: pnpm run lint
